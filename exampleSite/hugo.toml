baseURL = "https://example.com/"
title = "Debug客栈 AI 工具站"
theme = "hugo-theme-skills"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight = 1
    contentDir = "content"
    [languages.en.params]
      langHref = "/"
      langLabel = "EN"
  [languages.zh]
    languageName = "中文"
    languageCode = "zh-CN"
    weight = 2
    contentDir = "content/zh"
    [languages.zh.params]
      langHref = "/zh/"
      langLabel = "中文"

[params]
  author = "debuginn"
  logoImage = "/img/logo.png"
  blogURL = "https://blog.debuginn.com/"
  githubURL = "https://github.com/debuginn"
  copyright = "Open source, freely shared."
  themeName = "hugo-theme-skills"
  themeURL = "https://github.com/debuginn/hugo-theme-skills"
