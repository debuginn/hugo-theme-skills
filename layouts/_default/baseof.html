<!doctype html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  <link rel="icon" type="image/jpeg" href="{{ .Site.Params.logoImage | default "/img/logo.jpg" }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" /></noscript>
  <script>
    (function () {
      var key = "debuginn_tools_theme";
      var prefs = ["auto", "dark", "light"];
      var pref = "auto";
      try {
        var stored = window.localStorage ? window.localStorage.getItem(key) : null;
        if (prefs.indexOf(stored) !== -1) pref = stored;
      } catch (_) {}
      var resolved = pref;
      if (pref === "auto") {
        resolved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      document.documentElement.setAttribute("data-theme", resolved);
    })();
  </script>
  {{ block "styles" . }}<link rel="stylesheet" href="{{ "css/portal.css" | relURL }}" />{{ end }}
</head>
<body>
  {{ partial "header.html" . }}
  {{ block "main" . }}{{ end }}
  {{ partial "footer.html" . }}
  {{ block "scripts" . }}<script src="{{ "js/portal.js" | relURL }}"></script>{{ end }}
</body>
</html>
