name: Update Theme

on:
  schedule:
    # Update theme automatically everyday at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update-theme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "^1.21"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.147.1"
          extended: true

      - name: Update theme to latest
        run: |
          cd exampleSite
          hugo mod get -u github.com/debuginn/hugo-theme-skills

      - name: Tidy go.mod and go.sum
        run: |
          cd exampleSite
          hugo mod tidy

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "CI: Update theme to latest"
          file_pattern: "exampleSite/go.mod exampleSite/go.sum"
